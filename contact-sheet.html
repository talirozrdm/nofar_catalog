  <title>סקירת תמונות</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #f3f4f6;
      color: #111;
      font-family: Arial, sans-serif;
    }
    .wrap {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      direction: ltr;
    }
    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid #d6dbe3;
      border-radius: 8px;
      background: white;
      min-height: 180px;
    }
    img {
      display: block;
      width: 100%;
      height: 150px;
      object-fit: cover;
      background: #e8ebef;
    }
    .num {
      position: absolute;
      top: 6px;
      left: 6px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #111;
      color: white;
      font-weight: 800;
      font-size: 15px;
    }
    .label {
      padding: 6px 8px;
      font-size: 14px;
      font-weight: 700;
    }
  </style>
</head>
